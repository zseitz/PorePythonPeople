version: 1

runtime:
  name: nanopore-orchestrator-runtime
  run_root: .nanopore-runtime/runs
  resume_supported: true
  default_branch_strategy: sandbox-copy
  workspace_locking: per-run
  git_guardrails:
    require_clean_worktree: true
    recommend_feature_branch: true
  promotion:
    enabled: true
    require_approval: true

model_provider:
  adapter: ollama
  model: qwen3:4b
  base_url: http://localhost:11434
  temperature: 0.1
  max_retries: 2

specialists:
  orchestrator:
    prompt_file: runtime/prompts/nanopore-orchestrator.prompt.md
    tools: [read, search, edit, execute, todo]
  feature_builder:
    prompt_file: runtime/prompts/nanopore-feature-builder.prompt.md
    tools: [read, search, edit, execute, todo]
    # Optional specialist-level model override (inherits global provider fields):
    # model_provider:
    #   adapter: ollama
    #   model: qwen3:4b
  refactor:
    prompt_file: runtime/prompts/nanopore-python-refactor.prompt.md
    tools: [read, search, edit, execute, todo]
  doc_sync:
    prompt_file: runtime/prompts/nanopore-doc-sync.prompt.md
    tools: [read, search, edit, todo]
    model_provider:
      adapter: ollama
      model: qwen3:4b
  verifier:
    prompt_inline: |
      You are the nanoporethon verification specialist.
      Mission: verify behavior changes with the smallest relevant checks,
      report failures with root-cause hints, and prevent stage promotion when
      acceptance criteria are not satisfied.
      Return ONLY valid JSON (no markdown, no prose) with keys:
      checks_run (array[string]), quality_signals (object with require_refactor boolean),
      failures_or_warnings (array[string]), tests_exit_code (number|null),
      coverage_exit_code (number|null).
    tools: [read, search, execute, todo]
  memory_sync:
    prompt_inline: |
      You are the nanoporethon memory synchronization specialist.
      Mission: write concise, verified, non-speculative run learnings to
      repository memory files and summarize reusable patterns.
      Return ONLY valid JSON (no markdown, no prose) with keys:
      memory_updates (array[string]), reusable_patterns (array[string]),
      followup_constraints (array[string]), changed_files (array[string]).
    tools: [read, search, edit, todo]
    model_provider:
      adapter: ollama
      model: qwen3:4b

stages:
  - id: triage_plan
    owner: orchestrator
    required: true
    next_on_success: [implement]
  - id: implement
    owner: feature_builder
    required: true
    next_on_success: [verify]
  - id: verify
    owner: verifier
    required: true
    next_on_success: [refactor_or_docsync]
  - id: refactor_or_docsync
    owner: orchestrator
    required: true
    next_on_success: [refactor, doc_sync]
    routing:
      when:
        - condition: quality_signals.require_refactor == true
          next: refactor
        - condition: quality_signals.require_refactor == false
          next: doc_sync
  - id: refactor
    owner: refactor
    required: false
    next_on_success: [verify_after_refactor]
  - id: verify_after_refactor
    owner: verifier
    required: false
    next_on_success: [doc_sync]
  - id: doc_sync
    owner: doc_sync
    required: true
    next_on_success: [memory_sync]
  - id: memory_sync
    owner: memory_sync
    required: true
    next_on_success: [closeout]
  - id: closeout
    owner: orchestrator
    required: true

gates:
  triage_plan:
    required_checks:
      - id: complexity_classified
      - id: acceptance_criteria_present
      - id: impacted_components_listed
  implement:
    required_checks:
      - id: changeset_nonempty_or_noop_justified
      - id: no_unresolved_merge_markers
  verify:
    required_checks:
      - id: tests_pass
      - id: no_new_errors
      - id: coverage_meets_policy
    allow_no_tests_collected: false
    commands:
      tests: "pytest -q"
      coverage: "pytest --cov=nanoporethon --cov-report=term-missing"
  doc_sync:
    required_checks:
      - id: components_updated_if_contract_changed
      - id: textbook_updated_if_user_workflow_changed
      - id: request_log_appended
  memory_sync:
    required_checks:
      - id: repo_memory_updated

waivers:
  enabled: true
  require_approver: true
  allowed_approvers: [zachseitz]
  schema:
    required_fields: [waiver_id, gate_id, reason, approver, scope]

context_budgets:
  # Per-stage token budgets (estimated as chars / 4).
  # Compaction fires when utilization reaches the first threshold.
  default_budget: 8000
  triage_plan: 4000
  implement: 8000
  verify: 6000
  verify_after_refactor: 6000
  refactor_or_docsync: 3000
  refactor: 6000
  doc_sync: 4000
  memory_sync: 2000
  closeout: 2000
  # Cascade thresholds (percent): compact → warn → hard-block
  compaction_thresholds: [60, 75, 85]

repo_memory:
  target_files:
    - memories/repo/testing.md
    - memories/repo/orchestrator-runtime.md
  max_bullets_per_update: 8
  only_verified_facts: true

policies:
  command_allowlist:
    - pytest
    - python -m pytest
    - git status
    - git diff
    - ruff check
    - ruff format --check
  command_blocklist:
    - rm -rf /
    - sudo
    - curl | sh
  edit_scope:
    default_paths:
      - src/**
      - tests/**
      - Docs/**
      - .github/**
      - runtime/**
      - memories/repo/**
